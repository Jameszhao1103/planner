<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planner Workspace</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div class="title">
          <h1 id="tripTitle">Planner Workspace</h1>
          <p id="tripSubtitle">Shared state across map, timeline, plan, and assistant.</p>
        </div>
        <div class="meta" id="metaPills"></div>
        <div class="global-day-switcher">
          <div class="switcher-label">Global Day View</div>
          <div class="day-tabs" id="dayTabs"></div>
        </div>
      </section>

      <section class="grid">
        <article class="panel map">
          <h2>Map</h2>
          <div class="map-frame">
            <div class="map-canvas" id="mapCanvas"></div>
            <div class="map-status hidden" id="mapStatus"></div>
          </div>
          <div class="legend-row" id="mapLegend">
            <span class="legend-chip"><span class="dot airport"></span>Airport</span>
            <span class="legend-chip"><span class="dot hotel"></span>Hotel</span>
            <span class="legend-chip"><span class="dot restaurant"></span>Meal</span>
            <span class="legend-chip"><span class="dot sight"></span>Activity</span>
            <span class="legend-chip">Solid: drive</span>
            <span class="legend-chip">Dashed: walk</span>
          </div>
        </article>
        <section class="right-rail">
          <article class="panel timeline">
            <h2>Timeline</h2>
            <div id="timelinePanel"></div>
          </article>

          <article class="panel workspace">
            <div class="workspace-header">
              <h2>Workspace</h2>
              <div class="workspace-tabs">
                <button type="button" class="workspace-tab active" data-workspace-tab="selection">Selection</button>
                <button type="button" class="workspace-tab" data-workspace-tab="plan">Plan</button>
                <button type="button" class="workspace-tab" data-workspace-tab="assistant">Assistant</button>
              </div>
            </div>

            <div class="workspace-notice hidden" id="workspaceNotice"></div>

            <div class="workspace-body">
              <section class="workspace-view" data-workspace-view="selection">
                <div class="focus-editor" id="focusEditor"></div>
              </section>

              <section class="workspace-view hidden" data-workspace-view="plan">
                <div id="planPanel"></div>
              </section>

              <section class="workspace-view hidden assistant" data-workspace-view="assistant">
                <form id="assistantForm" class="assistant-form">
                  <textarea
                    id="assistantInput"
                    class="chat-input"
                    placeholder="Try: 把当前这天的晚餐换成评分高一点的美式餐厅"
                  ></textarea>
                  <div class="assistant-toolbar">
                    <button type="submit" class="button button-primary">Preview</button>
                    <button type="button" class="button" id="resetButton">Reset sample trip</button>
                  </div>
                </form>
                <div class="quick-actions">
                  <button type="button" class="action" data-quick-action="replace-dinner">Replace dinner</button>
                  <button type="button" class="action" data-quick-action="reoptimize-day">Reoptimize day</button>
                  <button type="button" class="action" data-quick-action="add-lunch">Add lunch</button>
                  <button type="button" class="action" data-quick-action="relax-day">Relax schedule</button>
                </div>
                <div class="assistant-status" id="assistantStatus">Loading trip…</div>
                <div class="diff" id="assistantDiff"></div>
                <div class="assistant-toolbar">
                  <button type="button" class="button button-primary hidden" id="applyButton">Apply preview</button>
                  <button type="button" class="button hidden" id="rejectButton">Reject preview</button>
                </div>
              </section>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
